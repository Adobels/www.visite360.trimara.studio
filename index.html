<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Trimara crée des visites virtuelles 360° pour Google Street View.">
    <title>Trimara - Visites virtuelles 360°</title>
    <link rel="stylesheet" href="styles.css?v=4">
  </head>
  <body>
    <main class="card" aria-label="Carte de visite Trimara">
      <div class="profile">
        <img class="portrait" src="assets/2026-06-19 14h42 Blazej SLEBODA generated.png" alt="Portrait du créateur de Trimara">
        <div class="identity">
          <strong>Blazej SLEBODA</strong>
          <span>Prénom phonétique : Bois-G-Ÿ</span>
        </div>
        <img class="camera-profile" src="assets/2026-06-19 15h23 Insta360 x5 profile.png" alt="Caméra Insta360 X5 utilisée pour les visites virtuelles 360°">
        <div class="street-view" aria-label="Google Street View">
          <svg viewBox="0 0 140 140" role="img" aria-hidden="true">
            <defs>
              <path id="street-view-text-arc" d="M 24 86 A 48 48 0 0 0 116 86"></path>
            </defs>
            <circle class="badge-disc" cx="70" cy="70" r="63"></circle>
            <circle class="badge-ring" cx="70" cy="70" r="63"></circle>
            <image href="assets/google-street-view.webp" x="46" y="30" width="48" height="48" preserveAspectRatio="xMidYMid meet"></image>
            <text class="badge-text">
              <textPath href="#street-view-text-arc" startOffset="50%" text-anchor="middle">Google Street View</textPath>
            </text>
          </svg>
        </div>
      </div>

      <div class="content">
        <div class="signature identity-lockup" aria-label="Identité Trimara">
          <div class="brand">
            <span class="brand-mark">T</span>
            <span>Trimara Studio</span>
          </div>
        </div>

        <h1>Créateur de visites virtuelles 360° pour Google Street View</h1>
        <p>Prises de vue 360°, préparation et publication de visites immersives pour valoriser vos lieux sur Google.</p>

        <div class="actions" aria-label="Contact">
          <a class="action primary" href="tel:+330661064248"><span class="action-label">+33 06 61 06 42 48</span></a>
          <a class="action secondary" href="mailto:contact@trimara.studio"><span class="action-label">contact@trimara.studio</span></a>
        </div>
      </div>
    </main>
    <script src="script.js?v=1"></script>
  </body>
</html>
